[runtime_state]
# Paths the verifier expects may exist in a deployed install
# but whose contents are user-mutable (saves, configs, GOG client
# state, DOSBox tuning, etc.). Glob patterns (fnmatchcase).
#
# Patterns matching entries in [files] override them: the verifier
# treats them as runtime_state (skipped), not as hash-checked.
patterns = [
  # Save / runtime-state files. DARKRUN.GFF ships pristine but
  # mutates as the player runs the game; treating as runtime_state
  # avoids a false positive on a played install.
  "CHARSAVE.GFF",
  "DARKSAVE.GFF",
  "DARKRUN.GFF",
  # Audio config; the GOG installer or DOSBox launcher writes to it.
  "SOUND.CFG",
  # DOSBox redistributable shipped by GOG; not part of game artifacts.
  "DOSBOX/*",
  # DOSBox configs (user-tweakable).
  "dosbox_*.conf",
  # GOG installer / desktop artifacts.
  "*.lnk",
  "EULA.txt",
  "gog.ico",
  "support.ico",
  "goglog.ini",
  "webcache.zip",
  "unins000.*",
  # GOG cloud sync (created on first GOG-client run).
  "cloud_saves/*",
  # verify-install --repair backups (created on first repair run).
  "__verify-install-backup/*",
]
