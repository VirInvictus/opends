# OpenDS repro harness: bug fixture

id          = "ds2-smoke"
target_game = "ds2"
description = """
DS2 boots into the main menu and stays running for the full
budget without DOSBox crashing or exiting on its own. Mirror
of ds1-smoke for the DS2 path (CD-audio imgmount on E:,
RAVAGER.BAT-style `DSUN -W0 -L` launch). The harness SIGTERMs
DOSBox at the timeout.
"""

[setup]
# DS2's MEL is at version 2.2.7 (newer than DS1's 2.0.9b) but
# the same DSP Detect Fail story: with the factory SOUND.CFG,
# MEL aborts on launch. The SOUND.CFG checked in here was
# generated by running sound_ds.exe inside DOSBox under Wine
# and selecting Sound Blaster, then captured from
# `~/.wine/drive_c/GOG Games/Dark Sun 2/SOUND.CFG`. Mirrors
# the ds1-smoke recipe.
copy_files = [
  { src = "SOUND.CFG", dst = "SOUND.CFG" },
]

# DS2's RAVAGER.BAT launches the engine with `-W0 -L`; the
# factory config-files contain the path-resolution logic for the
# CD-audio mount on D: (game.ins via imgmount, wired by
# configs/ds2.conf and the repro driver). The harness redirects
# DOS stdout to D: so MEL-fatal-style errors are recoverable
# from <scratch>/d/DSUN.LOG.
[trigger]
commands = [
  "DSUN -W0 -L > d:\\dsun.log",
]

[expected]
timeout_seconds     = 30
min_runtime_seconds = 25
require_files       = []
forbid_files        = []
