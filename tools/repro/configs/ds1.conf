# OpenDS repro harness — Dark Sun: Shattered Lands (GOG 1.10)
#
# This is the static base config; mounts and launch commands
# are injected per-invocation by repro.py via `-c` arguments.
# Tested with dosbox-staging 0.82.x on Fedora 44.

[sdl]
fullscreen   = false
# Opens a real window on the user's Wayland (or X) session.
# DOSBox-Staging probes OpenGL at init regardless of `output`,
# so SDL_VIDEODRIVER=dummy is unsupported. Run interactively.
output       = opengl
window_decorations = true
priority     = auto,auto
mouse_capture_modes = onclick

[dosbox]
machine      = svga_s3
memsize      = 16

[cpu]
core         = auto
cputype      = auto
cycles       = fixed 30000

[render]
aspect       = false

[mixer]
# Audio must initialise even on headless runs: DSUN.EXE's
# embedded MEL (Miles Audio Library) layer aborts on MIDI
# detect-fail and exits with "Mel Fatal Error #25 Trap #16".
# Keep the MPU401 mock alive; volume is irrelevant for repro.
nosound      = false
rate         = 22050
blocksize    = 1024
prebuffer    = 25

[sblaster]
sbtype       = sb16
sbbase       = 220
irq          = 7
dma          = 1
hdma         = 5

[midi]
mpu401       = intelligent
mididevice   = none

[autoexec]
# Intentionally empty. repro.py injects:
#   mount c <game-dir>
#   mount d <scratch-dir>
#   c:
#   <trigger commands>
#   exit
